<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptor de Audio - Código Corto</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 320px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .code-input {
            width: 70%;
            padding: 12px;
            margin-bottom: 25px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            color: #ffffff;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
            outline: none;
        }

        .listen-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #0077ff, #0055cc);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 119, 255, 0.4);
        }

        .listen-btn.listening {
            background: linear-gradient(145deg, #00ffcc, #00aa88);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
            color: #0d0d0d;
        }

        .status {
            margin-top: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
        }

        .status.online {
            color: #00ffcc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>RECEPTOR RADIO</h1>
        <p>Introduce el código de sintonía</p>

        <input type="number" id="codeStream" class="code-input" placeholder="00000">

        <button id="listenButton" class="listen-btn">CONECTAR</button>

        <div id="statusText" class="status">DESCONECTADO</div>
    </div>

    <audio id="remoteAudio" autoplay style="display:none;"></audio>

    <script>
        const listenButton = document.getElementById('listenButton');
        const statusText = document.getElementById('statusText');
        const codeStream = document.getElementById('codeStream');
        const remoteAudio = document.getElementById('remoteAudio');

        let isListening = false;
        window.peerConnection = null;
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function toggleListen() {
            const inputId = codeStream.value.trim();
            if (!inputId) { return alert("Ingresa un código válido"); }

            if (!isListening) {
                try {
                    statusText.innerText = "SINTONIZANDO...";

                    // 1. Obtener los datos del emisor desde la API de JsonBlob usando el código ingresado
                    const response = await fetch(`https://jsonblob.com/api/jsonBlob/radio-stream-${inputId}`);
                    if (!response.ok) throw new Error("Señal no encontrada");

                    const data = await response.json();
                    const offer = JSON.parse(atob(data.sdp));

                    // 2. Conexión de red nativa WebRTC (Sigue igual)
                    window.peerConnection = new RTCPeerConnection(rtcConfig);

                    window.peerConnection.ontrack = (event) => {
                        if (event.streams && event.streams[0]) {
                            remoteAudio.srcObject = event.streams[0];
                        }
                    };

                    await window.peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                    const answer = await window.peerConnection.createAnswer();
                    await window.peerConnection.setLocalDescription(answer);

                    isListening = true;
                    listenButton.classList.add('listening');
                    listenButton.innerText = "MUTEAR";
                    statusText.innerText = "ESCUCHANDO EN VIVO";
                    statusText.classList.add('online');



                } catch (error) {
                    console.error(error);
                    statusText.innerText = "CÓDIGO INVÁLIDO";
                    alert("No se encontró una transmisión activa con ese código o la señal expiró.");
                }
            } else {
                if (window.peerConnection) window.peerConnection.close();
                remoteAudio.srcObject = null;

                isListening = false;
                listenButton.classList.remove('listening');
                listenButton.innerText = "CONECTAR";
                statusText.innerText = "DESCONECTADO";
                statusText.classList.remove('online');
            }
        }

        listenButton.addEventListener('click', toggleListen);
    </script>
</body>

</html>
