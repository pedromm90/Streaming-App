<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />
    <title>Receptor de Audio Masivo</title>
    <style>
      /* Misma interfaz exacta */
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0d0d0d;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        text-align: center;
        padding: 40px;
        border-radius: 20px;
        background: #1a1a1a;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 320px;
        width: 100%;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 400;
        margin-bottom: 10px;
      }
      p {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }
      .listen-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(145deg, #0077ff, #0055cc);
        color: white;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 119, 255, 0.4);
      }
      .listen-btn.listening {
        background: linear-gradient(145deg, #00ffcc, #00aa88);
        box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        color: #0d0d0d;
      }
      .status {
        margin-top: 25px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #888;
      }
      .status.online {
        color: #00ffcc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>RECEPTOR RADIO</h1>
      <p>Sintonizar Audio en Tiempo Real</p>
      <button id="listenButton" class="listen-btn">ESCUCHAR</button>
      <div id="statusText" class="status">DESCONECTADO</div>
    </div>

    <audio id="audioPlayer" preload="none"></audio>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
      const listenButton = document.getElementById("listenButton");
      const statusText = document.getElementById("statusText");
      const audioPlayer = document.getElementById("audioPlayer");

      let isListening = false;
      let peer = null;
      let currentCall = null;

      // ID fijo de la emisora
      const RADIO_ID = "stremapp-radio-emisor-principal";

      function toggleListen() {
        if (!isListening) {
          statusText.innerText = "CONECTANDO...";
          
          // Crear cliente P2P
          peer = new Peer();

          peer.on('open', (id) => {
             // Conectar con la emisora para avisar que estamos aquí
             const conn = peer.connect(RADIO_ID);
             
             conn.on('open', () => {
                 statusText.innerText = "ESPERANDO TRANSMISIÓN...";
             });
          });

          // Cuando la emisora nos envía el audio
          peer.on('call', (call) => {
            currentCall = call;
            call.answer(); // Aceptar llamada sin enviar audio (solo recepción)
            
            call.on('stream', (remoteStream) => {
              audioPlayer.srcObject = remoteStream;
              audioPlayer.play().then(() => {
                isListening = true;
                listenButton.classList.add("listening");
                listenButton.innerText = "SILENCIAR";
                statusText.innerText = "EN VIVO";
                statusText.classList.add("online");
              }).catch((e) => {
                console.error("Error reproduciendo:", e);
              });
            });

            call.on('close', () => {
                // Si la emisora corta la transmisión
                if (isListening) toggleListen();
                alert("La transmisión ha finalizado.");
            });
          });

          peer.on('error', (err) => {
             console.error(err);
             if (err.type === 'peer-unavailable') {
                 alert("La emisora está apagada en este momento.");
                 statusText.innerText = "DESCONECTADO";
                 if (peer) { peer.destroy(); peer = null; }
             }
          });

        } else {
          // Detener por completo la recepción
          if (currentCall) currentCall.close();
          if (peer) { peer.destroy(); peer = null; }
          
          audioPlayer.pause();
          audioPlayer.srcObject = null;

          isListening = false;
          listenButton.classList.remove("listening");
          listenButton.innerText = "ESCUCHAR";
          statusText.innerText = "DESCONECTADO";
          statusText.classList.remove("online");
        }
      }

      listenButton.addEventListener("click", toggleListen);
    </script>
  </body>
</html>
