<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />
    <title>Emisor de Audio Universal</title>
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0d0d0d;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        text-align: center;
        padding: 40px;
        border-radius: 20px;
        background: #1a1a1a;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 320px;
        width: 100%;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 400;
        margin-bottom: 10px;
      }
      p {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }
      .stream-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(145deg, #ff3366, #dd2255);
        color: white;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
      }
      .stream-btn.streaming {
        background: linear-gradient(145deg, #00ffcc, #00aa88);
        box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        color: #0d0d0d;
      }
      .status {
        margin-top: 25px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #ff3366;
      }
      .status.online {
        color: #00ffcc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>EMISOR RADIO</h1>
      <p>Cualquier Micrófono, USB o Integrado</p>
      <button id="streamButton" class="stream-btn">EN VIVO</button>
      <div id="statusText" class="status">APAGADO</div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
      const streamButton = document.getElementById("streamButton");
      const statusText = document.getElementById("statusText");

      let isStreaming = false;
      let mediaStream = null;
      let peer = null;
      let connectedPeers = {};

      // ID fijo de la emisora (Los receptores se conectarán a este ID)
      const RADIO_ID = "stremapp-radio-emisor-principal";

      async function toggleStream() {
        if (!isStreaming) {
          try {
            statusText.innerText = "INICIANDO...";
            
            // 1. Captura del micrófono
            mediaStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false,
              },
              video: false,
            });

            // 2. Iniciar el servidor P2P en el navegador con un ID fijo
            peer = new Peer(RADIO_ID);

            peer.on('open', (id) => {
              isStreaming = true;
              streamButton.classList.add("streaming");
              streamButton.innerText = "DETENER";
              statusText.innerText = "EN VIVO (ESPERANDO OYENTES)";
              statusText.classList.add("online");
            });

            // 3. Escuchar conexiones de los oyentes
            peer.on('connection', (conn) => {
              conn.on('open', () => {
                statusText.innerText = "EN VIVO (OYENTES CONECTADOS)";
                // Enviar el flujo de audio al oyente que se conectó
                const call = peer.call(conn.peer, mediaStream);
                connectedPeers[conn.peer] = call;
                
                call.on('close', () => {
                  delete connectedPeers[conn.peer];
                  if (Object.keys(connectedPeers).length === 0) {
                     statusText.innerText = "EN VIVO (ESPERANDO OYENTES)";
                  }
                });
              });
            });
            
            peer.on('error', (err) => {
              console.error(err);
              if (err.type === 'unavailable-id') {
                 alert("Ya hay una transmisión activa. Detenla primero o cierra otras pestañas.");
                 if (isStreaming) toggleStream();
              }
            });

          } catch (error) {
            console.error(error);
            alert("Asegúrate de dar permisos al micrófono de tu equipo.");
            statusText.innerText = "APAGADO";
          }
        } else {
          // Detener la transmisión
          isStreaming = false;
          streamButton.classList.remove("streaming");
          streamButton.innerText = "EN VIVO";
          statusText.innerText = "APAGADO";
          statusText.classList.remove("online");

          // Cortar todas las llamadas activas a los oyentes
          for (let peerId in connectedPeers) {
            if (connectedPeers[peerId]) connectedPeers[peerId].close();
          }
          connectedPeers = {};

          if (peer) {
            peer.destroy();
            peer = null;
          }
          if (mediaStream) {
            mediaStream.getTracks().forEach((track) => track.stop());
            mediaStream = null;
          }
        }
      }

      streamButton.addEventListener("click", toggleStream);
    </script>
  </body>
</html>
