<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emisor de Audio - Código Corto</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 20px;
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 320px;
            width: 100%;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .stream-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(145deg, #ff3366, #dd2255);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
            margin-bottom: 25px;
        }

        .stream-btn.streaming {
            background: linear-gradient(145deg, #00ffcc, #00aa88);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
            color: #0d0d0d;
        }

        .id-box {
            display: none;
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            font-size: 1.2rem;
            color: #00ffcc;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 10px;
        }

        .status {
            margin-top: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff3366;
        }

        .status.online {
            color: #00ffcc;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>EMISOR RADIO</h1>
        <p>Cualquier micrófono / interfaz USB</p>

        <button id="streamButton" class="stream-btn">EN VIVO</button>

        <div id="idBox" class="id-box">00000</div>

        <div id="statusText" class="status">APAGADO</div>
    </div>

    <script>
        const streamButton = document.getElementById('streamButton');
        const statusText = document.getElementById('statusText');
        const idBox = document.getElementById('idBox');

        let isStreaming = false;
        window.audioContext = null;
        window.mediaStream = null;
        window.peerConnection = null;

        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // Generar un ID numérico corto aleatorio de 5 dígitos
        const shortId = Math.floor(10000 + Math.random() * 90000).toString();

        async function toggleStream() {
            if (!isStreaming) {
                try {
                    statusText.innerText = "INICIANDO HARDWARE...";

                    // Captura universal para cualquier micrófono o laptop All-in-One
                    window.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
                        video: false
                    });

                    // Retorno de audio local continuo
                    window.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
                    const source = window.audioContext.createMediaStreamSource(window.mediaStream);
                    source.connect(window.audioContext.destination);

                    // Configurar WebRTC nativo
                    window.peerConnection = new RTCPeerConnection(rtcConfig);
                    window.mediaStream.getTracks().forEach(track => window.peerConnection.addTrack(track, window.mediaStream));

                    const offer = await window.peerConnection.createOffer();
                    await window.peerConnection.setLocalDescription(offer);

                    window.peerConnection.onicecandidate = async (event) => {
                        if (event.candidate === null) {
                            // Formateamos los datos de conexión como un JSON válido
                            const sdpPayload = { sdp: btoa(JSON.stringify(window.peerConnection.localDescription)) };

                            statusText.innerText = "PUBLICANDO SEÑAL...";

                            try {
                                // Guardamos el objeto directamente en JsonBlob usando el ID corto
                                // Nota: Para que sea identificable, lo enviamos en una estructura limpia
                                await fetch(`https://jsonblob.com/api/jsonBlob/radio-stream-${shortId}`, {
                                    method: 'PUT', // PUT crea o reemplaza el almacén con ese nombre ficticio
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify(sdpPayload)
                                });

                                // Mostrar el ID corto de 5 dígitos en pantalla
                                idBox.innerText = shortId;
                                idBox.style.display = 'block';
                                statusText.innerText = "TRANSMITIENDO EN VIVO";
                                statusText.classList.add('online');

                            } catch (err) {
                                console.error("Error al publicar en el servidor proxy:", err);
                                statusText.innerText = "ERROR DE SERVIDOR";
                            }

                        }
                    };

                    isStreaming = true;
                    streamButton.classList.add('streaming');
                    streamButton.innerText = "DETENER";

                } catch (error) {
                    console.error(error);
                    alert("Error de hardware. Verifica los permisos de tu micrófono.");
                    statusText.innerText = "APAGADO";
                }
            } else {
                if (window.audioContext) window.audioContext.close();
                if (window.mediaStream) window.mediaStream.getTracks().forEach(track => track.stop());
                if (window.peerConnection) window.peerConnection.close();

                isStreaming = false;
                idBox.style.display = 'none';
                streamButton.classList.remove('streaming');
                streamButton.innerText = "EN VIVO";
                statusText.innerText = "APAGADO";
                statusText.classList.remove('online');
            }
        }

        // Copiar ID corto al hacer clic
        idBox.addEventListener('click', () => {
            navigator.clipboard.writeText(idBox.innerText);
            alert("¡Código de radio copiado!");
        });

        streamButton.addEventListener('click', toggleStream);
    </script>
</body>

</html>
