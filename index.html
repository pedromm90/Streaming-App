<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emisor de Audio Universal</title>
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: #0d0d0d;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        text-align: center;
        padding: 40px;
        border-radius: 20px;
        background: #1a1a1a;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        max-width: 320px;
        width: 100%;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 400;
        margin-bottom: 10px;
      }
      p {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 30px;
      }
      .stream-btn {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(145deg, #ff3366, #dd2255);
        color: white;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
      }
      .stream-btn.streaming {
        background: linear-gradient(145deg, #00ffcc, #00aa88);
        box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
        color: #0d0d0d;
      }
      .status {
        margin-top: 25px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #ff3366;
      }
      .status.online {
        color: #00ffcc;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>EMISOR RADIO</h1>
      <p>Cualquier Micrófono, USB o Integrado</p>
      <button id="streamButton" class="stream-btn">EN VIVO</button>
      <div id="statusText" class="status">APAGADO</div>
    </div>

    <script>
      const streamButton = document.getElementById("streamButton");
      const statusText = document.getElementById("statusText");

      let isStreaming = false;
      window.mediaStream = null;
      window.mediaRecorder = null;

      // ** REEMPLAZA ESTO **: Tu URL de servidor de streaming (Icecast/Shoutcast/Relaypoint)
      const STREAMING_SERVER_URL = "http://sapircast.caster.fm:14472";

      async function toggleStream() {
        if (!isStreaming) {
          try {
            // Captura universal: funciona en Laptops, All-in-One, USB y Jack
            window.mediaStream = await navigator.mediaDevices.getUserMedia({
              audio: {
                echoCancellation: false, // Fiel al sonido original
                noiseSuppression: false,
                autoGainControl: false,
              },
              video: false,
            });

            // Graba el audio en ráfagas de tiempo real en formato nativo WebM/Ogg de audio
            window.mediaRecorder = new MediaRecorder(window.mediaStream, {
              mimeType: "audio/webm;codecs=opus",
            });

            // Cada vez que haya datos de audio disponibles (cada 1 segundo), los envía al servidor
            window.mediaRecorder.ondataavailable = async (event) => {
              if (event.data.size > 0 && isStreaming) {
                // Envío nativo continuo mediante HTTP POST sin librerías
                fetch(STREAMING_SERVER_URL, {
                  method: "POST",
                  body: event.data,
                  cache: "no-store",
                }).catch((e) =>
                  console.log("Transmitiendo paquete de audio..."),
                );
              }
            };

            // Inicia la grabación y fragmenta el audio cada 1000 milisegundos (1 segundo)
            window.mediaRecorder.start(1000);

            isStreaming = true;
            streamButton.classList.add("streaming");
            streamButton.innerText = "DETENER";
            statusText.innerText = "TRANSMITIENDO AL SERVIDOR";
            statusText.classList.add("online");
          } catch (error) {
            console.error(error);
            alert("Asegúrate de dar permisos al micrófono de tu equipo.");
          }
        } else {
          if (window.mediaRecorder) window.mediaRecorder.stop();
          if (window.mediaStream)
            window.mediaStream.getTracks().forEach((track) => track.stop());

          isStreaming = false;
          streamButton.classList.remove("streaming");
          streamButton.innerText = "EN VIVO";
          statusText.innerText = "APAGADO";
          statusText.classList.remove("online");
        }
      }

      streamButton.addEventListener("click", toggleStream);
    </script>
  </body>
</html>
